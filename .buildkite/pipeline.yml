steps:
  - label: ":java: Build maps_apps"
    key: "build"
    command:
      - "mvn --batch-mode clean verify"
    artifact_paths:
      - "*/target/*.jar"
    agents:
      queue: "java_build_queue"

  - label: ":debian: Build and publish maps-apps"
    key: "debian"
    depends_on: "build"
    command:
      - 'buildkite-agent artifact download "*/target/*.jar" . --step build'
      - "chmod +x ./packaging/scripts/*.sh"
      - "./packaging/scripts/build-debian.sh"
      - "dpkg-deb --info packaging/output/*.deb"
      - "dpkg-deb --contents packaging/output/*.deb"
      - >
        ./packaging/scripts/upload_deb_package.sh
        "$(buildkite-agent secret get NEXUS_USER)"
        "$(buildkite-agent secret get NEXUS_PASSWORD)"
        maps_apt_daily
    artifact_paths:
      - "packaging/output/*.deb"
    agents:
      queue: "java_build_queue"